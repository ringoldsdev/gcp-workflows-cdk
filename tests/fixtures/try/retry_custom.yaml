- reliable:
    try:
      call: http.post
      args:
        url: https://example.com/api
        body:
          data: "important"
      result: response
    retry:
      predicate: ${http.default_retry_predicate}
      max_retries: 5
      backoff:
        initial_delay: 1
        max_delay: 60
        multiplier: 2
