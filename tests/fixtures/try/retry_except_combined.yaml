- robust:
    try:
      call: http.get
      args:
        url: https://example.com/api
      result: response
    retry:
      predicate: ${http.default_retry_predicate}
      max_retries: 3
      backoff:
        initial_delay: 1
        max_delay: 30
        multiplier: 2
    except:
      as: e
      steps:
        - fallback:
            return: "all retries failed"
