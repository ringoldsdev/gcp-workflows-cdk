# Workflow with valid arithmetic expressions
- init:
    assign:
      - a: 10
      - b: 20
      - sum: ${a + b}
      - diff: ${a - b}
      - product: ${a * b}
      - quotient: ${a / b}
      - remainder: ${a % b}
      - negated: ${-a}
      - complex: ${(a + b) * 2 - (a / b)}
      - nested_parens: ${((a + b) * (a - b))}
