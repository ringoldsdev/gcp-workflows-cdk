# Except 'as' variable referenced OUTSIDE the except block -- should error
- attempt:
    try:
      call: http.get
      args:
        url: "https://example.com/api"
      result: response
    except:
      as: e
      steps:
        - log_error:
            assign:
              - error_msg: ${e.message}
- after_try:
    assign:
      - bad_ref: ${e.code}
